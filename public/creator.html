<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oensker — Manage Your List</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
    }
    h1 { font-size: 1.4rem; }
    label { display: block; margin-top: 12px; font-weight: 600; font-size: 0.9rem; }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      padding: 10px 16px;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { background: #444; }
    .item-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      cursor: pointer;
    }
    .item-card:hover { background: #fafafa; }
    .item-name { font-weight: 600; }
    .item-meta { font-size: 0.85rem; color: #666; margin-top: 2px; }
    #addItemForm {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
    .guest-link-box {
      margin-top: 20px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 6px;
      font-size: 0.85rem;
      word-break: break-all;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      background: white;
      border-radius: 8px;
      padding: 20px;
      max-width: 400px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .cancel-btn {
      background: #eee;
      color: #222;
    }
    .cancel-btn:hover { background: #ddd; }
    .delete-btn {
      background: #c0392b;
    }
    .delete-btn:hover { background: #e74c3c; }
  </style>
</head>
<body>
  <h1 id="listTitle">Loading...</h1>
  <div class="event-date" id="deletionNote"></div>
  <button class="cancel-btn" id="deleteListBtn" style="margin-top:8px;">Delete this list</button>

  <div id="itemsList"></div>

  <form id="addItemForm">
    <label for="name">Item name</label>
    <input type="text" id="name" required placeholder="e.g. Bike">

    <label for="price">Price (optional)</label>
    <input type="text" id="price" placeholder="e.g. 300">

    <label for="remark">Remark (optional)</label>
    <input type="text" id="remark" placeholder="e.g. Blue, size M">

    <label for="link">Link (optional)</label>
    <input type="url" id="link" placeholder="https://...">

    <button type="submit">Add item</button>
  </form>

  <div class="guest-link-box">
    <strong>Share this link with guests:</strong><br>
    <a id="guestLink" href="#"></a>
  </div>

  <!-- Modal for viewing/editing an item -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <h2>Edit item</h2>
      <label for="editName">Item name</label>
      <input type="text" id="editName" required>

      <label for="editPrice">Price</label>
      <input type="text" id="editPrice">

      <label for="editRemark">Remark</label>
      <input type="text" id="editRemark">

      <label for="editLink">Link</label>
      <input type="url" id="editLink">

      <div class="modal-actions">
        <button id="saveBtn">Save changes</button>
        <button class="cancel-btn" id="cancelBtn" type="button">Cancel</button>
        <button class="delete-btn" id="deleteBtn" type="button">Delete item</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const listId = params.get('list');
    const creatorToken = params.get('token');
    let currentEditId = null;

    async function loadList() {
      const res = await fetch(`/lists/${listId}/creator?creator_token=${creatorToken}`);
      if (!res.ok) {
        document.getElementById('listTitle').textContent = 'List not found or unauthorized';
        return;
      }
      const data = await res.json();
      document.getElementById('listTitle').textContent = data.title;

      const deletionDate = new Date(data.event_date);
      deletionDate.setFullYear(deletionDate.getFullYear() + 1);
      document.getElementById('deletionNote').textContent =
        `This list will be automatically deleted on ${deletionDate.toISOString().split('T')[0]} if not updated before then.`;

      const guestUrl = `${location.origin}/guest.html?list=${listId}`;
      document.getElementById('guestLink').href = guestUrl;
      document.getElementById('guestLink').textContent = guestUrl;

      const itemsList = document.getElementById('itemsList');
      itemsList.innerHTML = '';
        data.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
            <div class="item-name">${item.name}</div>
            <div class="item-meta">${item.price ? item.price : ''}</div>
            `;
            card.addEventListener('click', () => openEditModal(item));
            itemsList.appendChild(card);
        });
    }

    function openEditModal(item) {
      currentEditId = item.item_id;
      document.getElementById('editName').value = item.name || '';
      document.getElementById('editPrice').value = item.price || '';
      document.getElementById('editRemark').value = item.remark || '';
      document.getElementById('editLink').value = item.link || '';
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
      currentEditId = null;
    }

    document.getElementById('cancelBtn').addEventListener('click', closeModal);

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const body = {
        creator_token: creatorToken,
        name: document.getElementById('editName').value,
        price: document.getElementById('editPrice').value || null,
        remark: document.getElementById('editRemark').value || null,
        link: document.getElementById('editLink').value || null,
      };
      await fetch(`/items/${currentEditId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      closeModal();
      loadList();
    });

    document.getElementById('deleteBtn').addEventListener('click', async () => {
      await fetch(`/items/${currentEditId}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ creator_token: creatorToken })
      });
      closeModal();
      loadList();
    });

    document.getElementById('addItemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = {
        creator_token: creatorToken,
        name: document.getElementById('name').value,
        price: document.getElementById('price').value || null,
        remark: document.getElementById('remark').value || null,
        link: document.getElementById('link').value || null,
      };

      await fetch(`/lists/${listId}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      e.target.reset();
      loadList();
    });

    document.getElementById('deleteListBtn').addEventListener('click', () => {
      const confirmOverlay = document.createElement('div');
      confirmOverlay.className = 'modal-overlay';
      confirmOverlay.style.display = 'flex';
      confirmOverlay.innerHTML = `
        <div class="modal-box">
          <p><strong>Delete this list permanently?</strong></p>
          <p>This cannot be undone.</p>
          <div class="modal-actions">
            <button id="confirmCancelBtn">Cancel</button>
            <button class="cancel-btn" id="confirmDeleteBtn" type="button" style="font-size:0.85rem;">Delete permanently</button>
          </div>
        </div>
      `;
      document.body.appendChild(confirmOverlay);

      document.getElementById('confirmCancelBtn').addEventListener('click', () => {
        confirmOverlay.remove();
      });
      document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
        await fetch(`/lists/${listId}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ creator_token: creatorToken })
        });
        document.body.innerHTML = '<p style="text-align:center;margin-top:60px;font-family:system-ui;">This list has been deleted.</p>';
      });
    });

    loadList();
  </script>
</body>
</html>
